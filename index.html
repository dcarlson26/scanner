<!DOCTYPE html>
<html>
<head>
  <title>Card Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="lib/opencv.js"></script>

  <style>
    body { margin:0; background:black; color:white; text-align:center; font-family:sans-serif; }

#video {

    display: block;

    width: 100%;

    height: auto;
}

#overlay{

position:absolute;

border:3px solid red;

pointer-events: none;

box-sizing:border-box;
}

#captureBtn{

    position:absolute;

    bottom:20px;

    left:50%;

    transform:translateX(-50%);

    font-size:28px;

    padding:18px 40px;

    border-radius:18px;

    border:none;

    background:#1976d2;

    color:white;

    font-weight:bold;

    cursor:pointer;

    z-index:10;
}

#status { 

  position:absolute; 

  top:10px; 

  width:100%; 
}

#cameraContainer {

  position: relative;

  width: 100%;

  max-width: 500px;

  margin: auto;
}

#results {

    margin-top: 15px;

    font-size: 20px;
}

#history { 
  text-align:left; 

  padding:10px; 
}
#debugCanvas{

    width:100%;

    max-width:400px;

    border:2px solid white;

    margin-top:20px;

    background:black;
}

#debugInfo{

    margin:15px;

    font-family:monospace;

    text-align:left;

    white-space:pre-line;
}
  </style>
</head>

<body>
<div id="status">
Initializing...
</div>
<div id="cameraContainer">
    <video id="video"></video>
    <div id="overlay"></div>
    <button id="captureBtn">
        Capture
    </button>
</div>

<div id="results">
    <div id="lrResult"></div>
    <div id="tbResult"></div>
</div>

<div id="history"></div>
<h3>Debug View</h3>

<canvas
    id="debugCanvas"
    width="400"
    height="600">
</canvas>

<div id="debugInfo"></div>
<script>
let cvReady = false;
cv['onRuntimeInitialized'] = () => { cvReady = true; };

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const statusText = document.getElementById('status');

const constraints = {
    audio: false,
    video: {
        facingMode: {
            ideal: "environment"
        },
        width: {
            ideal: 1920
        },
        height: {
            ideal: 1080
        }
    }
};
async function init() {

    if (!navigator.mediaDevices ||
        !navigator.mediaDevices.getUserMedia) {

        statusText.innerText = "Camera API not supported.";
        return;
    }

    try {
        const stream =
            await navigator.mediaDevices.getUserMedia(constraints);

    video.srcObject = stream;
    } catch (err) {
        console.error(err);
        statusText.innerText = err.message;
    }
}

init();

function updateOverlay() {

    const rect = video.getBoundingClientRect();

    const margin = 20;

    let guideWidth =
        rect.width - margin * 2;

    let guideHeight =
        guideWidth * 88 / 63;

    if (guideHeight > rect.height - margin * 2) {

        guideHeight =
            rect.height - margin * 2;

        guideWidth =
            guideHeight * 63 / 88;
    }

    overlay.style.width = guideWidth + "px";
    overlay.style.height = guideHeight + "px";

    overlay.style.left =
        ((rect.width - guideWidth) / 2) + "px";

    overlay.style.top =
        ((rect.height - guideHeight) / 2) + "px";
}

video.onloadedmetadata = async () => {

    await video.play();

    requestAnimationFrame(() => {

        updateOverlay();

    });

};
window.addEventListener("resize", updateOverlay);

window.addEventListener("orientationchange", () => {
    setTimeout(updateOverlay, 200);
});
/* ---------- HISTORY ---------- */
function saveHistory(entry){
  let data = JSON.parse(localStorage.getItem("cardHistory") || "[]");
  data.unshift(entry);
  data = data.slice(0,10); // keep last 10
  localStorage.setItem("cardHistory", JSON.stringify(data));
  renderHistory();
}

function renderHistory(){
  let data = JSON.parse(localStorage.getItem("cardHistory") || "[]");
  let html = "";
  data.forEach(e=>{
    html += `<div>
      L/R: ${e.lr}<br>
      T/B: ${e.tb}<br>
      <small>${e.date}</small>
      <hr>
    </div>`;
  });
  document.getElementById("history").innerHTML = html;
}

renderHistory();

/* ---------- LIVE DETECTION ---------- */
setInterval(() => {
  if (!cvReady || video.videoWidth === 0) return;

  let tmp = document.createElement('canvas');
  tmp.width = video.videoWidth;
  tmp.height = video.videoHeight;
  let ctx = tmp.getContext('2d');
  ctx.drawImage(video,0,0);

  let src = cv.imread(tmp);
  let gray = new cv.Mat();
  let edges = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, gray, new cv.Size(5,5),0);
  cv.Canny(gray, edges, 50,150);

  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();
  cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let found = false;

  for (let i=0;i<contours.size();i++){
    let cnt = contours.get(i);
    let peri = cv.arcLength(cnt,true);
    let approx = new cv.Mat();
    cv.approxPolyDP(cnt, approx, 0.02*peri, true);
    if (approx.rows === 4) found = true;
    approx.delete();
  }

  if (found){
    overlay.style.borderColor="lime";
    statusText.innerText="Aligned ✔";
  } else {
    overlay.style.borderColor="red";
    statusText.innerText="Find card...";
  }

  src.delete(); gray.delete(); edges.delete();
  contours.delete(); hierarchy.delete();
}, 300);

/* ---------- CAPTURE ---------- */
document.getElementById("captureBtn").onclick = async () => {

    if (!cvReady) {
        alert("OpenCV is still loading.");
        return;
    }

    if (video.videoWidth === 0) {
        alert("Camera is not ready.");
        return;
    }

    try {

        let canvasTmp = document.createElement("canvas");

        canvasTmp.width = video.videoWidth;
        canvasTmp.height = video.videoHeight;

        let ctx = canvasTmp.getContext("2d");

        ctx.drawImage(video, 0, 0);

        await processImage(canvasTmp);

    }
    catch (err) {

        console.error(err);

        alert(err);

    }

};

async function processImage(canvasEl) {
  console.log("Processing image...");
  let src = cv.imread(canvasEl);
  let gray = new cv.Mat();
  let edges = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, gray, new cv.Size(5,5),0);
  cv.Canny(gray, edges, 50,150);

  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();
  cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let best=null, maxArea=0;

  for (let i = 0; i < contours.size(); i++) {

      let cnt = contours.get(i);

      let area = cv.contourArea(cnt);

      let peri = cv.arcLength(cnt, true);

      let approx = new cv.Mat();

      cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

      const isBest =
          approx.rows === 4 &&
          area > maxArea;

      if (isBest) {

          maxArea = area;

          if (best) {
              best.delete();
          }

          best = approx.clone();
      }

      approx.delete();
  }

  if (!best) return;

  let pts=[];
  for(let i=0;i<4;i++){
    pts.push({x:best.intPtr(i,0)[0], y:best.intPtr(i,0)[1]});
  }

  pts.sort((a,b)=>a.y-b.y);
  let top = pts.slice(0,2).sort((a,b)=>a.x-b.x);
  let bottomRow  = pts.slice(2,4).sort((a,b)=>a.x-b.x);
  let ordered = [top[0], top[1], bottomRow [1], bottomRow [0]];

  let srcTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    ordered[0].x,ordered[0].y,
    ordered[1].x,ordered[1].y,
    ordered[2].x,ordered[2].y,
    ordered[3].x,ordered[3].y
  ]);

  let w=400,h=600;
  let dstTri = cv.matFromArray(4,1,cv.CV_32FC2,[0,0,w,0,w,h,0,h]);

  let M = cv.getPerspectiveTransform(srcTri,dstTri);
  let warped = new cv.Mat();
  cv.warpPerspective(src, warped, M, new cv.Size(w,h));
  console.log("Warp successful");
  let grayWarp = new cv.Mat();

  cv.cvtColor(
      warped,
      grayWarp,
      cv.COLOR_RGBA2GRAY
  );

  cv.GaussianBlur(
      grayWarp,
      grayWarp,
      new cv.Size(5,5),
      0
  );

  let edgeImage = new cv.Mat();

  cv.Canny(
      grayWarp,
      edgeImage,
      60,
      120
  );
  let lines = new cv.Mat();

  cv.HoughLinesP(

      edgeImage,

      lines,

      1,

      Math.PI/180,

      50,

      60,

      10

  );
  console.log("Found", lines.rows, "lines");

  let verticalCount = 0;

  let horizontalCount = 0;
  
  for (let i=0;i<lines.rows;i++) {

    let line =
        lines.data32S.subarray(i*4,i*4+4);

    let x1=line[0];
    let y1=line[1];

    let x2=line[2];
    let y2=line[3];

    let dx=Math.abs(x2-x1);

    let dy=Math.abs(y2-y1);

    let color;

    if (dy > dx*3){

        verticalCount++;

        color=[0,255,0,255];

    }
    else if(dx > dy*3){

        horizontalCount++;

        color=[255,0,0,255];

    }
    else{

        color=[255,255,0,255];

    }

    cv.line(

        warped,

        new cv.Point(x1,y1),

        new cv.Point(x2,y2),

        color,

        2

    );

  }
  cv.imshow(
    "debugCanvas",
    warped
  );
  document.getElementById("debugInfo").innerText =

  `Lines detected: ${lines.rows}

  Vertical: ${verticalCount}

  Horizontal: ${horizontalCount}`;
  /* ---------- CENTERING ---------- */
  
 /*
  saveHistory({
      lr: `${lPct}% / ${rPct}%`,
      tb: `${tPct}% / ${bPct}%`,
      leftMargin: left,
      rightMargin: right,
      topMargin: topDist,
      bottomMargin: bottomMargin,
      date: new Date().toLocaleString()
  });
  */
  grayWarp.delete();

  edgeImage.delete();

  lines.delete();

  warped.delete();

  src.delete(); 

  gray.delete(); 

  edges.delete();
}
</script>

</body>
</html>
